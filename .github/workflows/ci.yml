name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
        env:
          NODE_ENV: development

  bench:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Benchmark (head)
        run: BENCH_SAMPLES_PATH=head-samples.json bun run bench
        env:
          NODE_ENV: development

      - name: Benchmark (main baseline)
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }} -- src/
          BENCH_SAMPLES_PATH=/tmp/base-samples.json bun run bench
          git checkout ${{ github.sha }} -- src/
        env:
          NODE_ENV: development

      - name: Compare against main
        if: github.event_name == 'pull_request'
        run: bun tests/bench/compare.ts /tmp/base-samples.json head-samples.json
        continue-on-error: true
        env:
          NODE_ENV: development

      - name: Post results
        if: always()
        run: |
          sleep 2
          pr_qs=""
          if [ -n "$PR_NUMBER" ]; then
            pr_qs="?pr=$PR_NUMBER"
          fi
          job_url=$(gh run view "$GITHUB_RUN_ID" --json jobs --jq "
            .jobs[] | select(.name == \"bench\")
            | (.url + \"${pr_qs}\" + (.steps[] | select(.name == \"Benchmark (head)\")
              | \"#step:\(.number):1\"))")

          : > /tmp/summary.md
          if [ -f benchmark-comparison.md ]; then
            cat benchmark-comparison.md >> /tmp/summary.md
            echo "" >> /tmp/summary.md
          fi
          if [ -f benchmark-report.md ]; then
            if [ -n "$job_url" ]; then
              sed "1a\\
\\
> Full benchmark output in the [CI job logs](${job_url})." benchmark-report.md >> /tmp/summary.md
            else
              cat benchmark-report.md >> /tmp/summary.md
            fi
          fi

          [ -s /tmp/summary.md ] && cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -s /tmp/summary.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/summary.md --edit-last 2>/dev/null || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/summary.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-report.md
            benchmark-comparison.md
            head-samples.json
          retention-days: 30
