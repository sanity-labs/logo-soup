name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
        env:
          NODE_ENV: development

  bench:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Benchmark (head)
        run: bun run bench
        env:
          NODE_ENV: development

      - name: Benchmark (main baseline)
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }} -- src/
          BENCH_OUT_DIR=/tmp/baseline bun run bench
          git checkout ${{ github.sha }} -- src/
        env:
          NODE_ENV: development

      - name: Compare against main
        if: github.event_name == 'pull_request'
        run: bun tests/bench/compare.ts /tmp/baseline/benchmark-samples.json tmp/benchmark-samples.json "$GITHUB_HEAD_REF"
        continue-on-error: true
        env:
          NODE_ENV: development

      - name: Post results
        if: always()
        run: |
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          : > /tmp/summary.md
          if [ -f tmp/benchmark-comparison.md ]; then
            cat tmp/benchmark-comparison.md >> /tmp/summary.md
            echo "" >> /tmp/summary.md
            [ -f tmp/benchmark-features.md ] && cat tmp/benchmark-features.md >> /tmp/summary.md && echo "" >> /tmp/summary.md
          elif [ -f tmp/benchmark-report.md ]; then
            cat tmp/benchmark-report.md >> /tmp/summary.md
            echo "" >> /tmp/summary.md
          fi
          [ -s /tmp/summary.md ] && echo "Full benchmark output in the [CI job logs](${RUN_URL})." >> /tmp/summary.md

          [ -s /tmp/summary.md ] && cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -s /tmp/summary.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/summary.md --edit-last 2>/dev/null || \
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/summary.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: tmp/
          retention-days: 30
